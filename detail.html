<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Detail</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="detail-page">
<img id="img">
<h2 id="title"></h2>
<p id="price"></p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<script>
const data={
1:{title:"Issue 1",price:"₩15000",img:"https://via.placeholder.com/300x400/000/fff"},
2:{title:"Issue 2",price:"₩18000",img:"https://via.placeholder.com/300x400/333/fff"}
};

const id=new URLSearchParams(location.search).get("book");
const book=data[id];

img.src=book.img;
title.innerText=book.title;
price.innerText=book.price;

function addToCart(){
 let cart=JSON.parse(localStorage.getItem("cart"))||[];
 cart.push(book);
 localStorage.setItem("cart",JSON.stringify(cart));
 alert("Added to cart");
}
</script>

</body>
</html>
